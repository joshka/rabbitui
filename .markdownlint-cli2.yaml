config:
  line-length:
    line_length: 100
    tables: false
    code_blocks: false
  table-pipe-style:
    style: leading_and_trailing
  table-column-style:
    style: aligned
    aligned_delimiter: true
  # Bold pseudo-headings ("**Sources**", "**Verdict:**") are a deliberate memo
  # idiom; prettier emits underscore emphasis.
  no-emphasis-as-heading: false
  emphasis-style:
    style: underscore
ignores:
  - target/**
  - docs/research/tui-framework-field-report-2026.md
  # A verbatim mirror of qwertty's coordination doc (authored on their side, not
  # to our markdown style). Never hand-edit the mirror; refresh it from the
  # drop-box. Excluded so their emphasis/table style does not fail our lint.
  - docs/substrate/substrate-status.md
