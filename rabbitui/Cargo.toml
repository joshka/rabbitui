[package]
name = "rabbitui"
description = "A terminal user interface framework"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rabbitui-core.workspace = true
qwertty.workspace = true
rustix.workspace = true
tokio.workspace = true
futures-core.workspace = true
toml = { workspace = true, optional = true }

[dev-dependencies]
rabbitui-widgets.workspace = true
rabbitui-testing.workspace = true
# `test-util` gives the Effects unit tests a paused clock so timeout/stream
# timing is deterministic; `rt-multi-thread` lets a `#[tokio::test]` spawn effect
# tasks. Dev-only: the facade itself needs neither.
tokio = { workspace = true, features = ["test-util", "rt-multi-thread"] }
# Markdown parsing for the agent-chrome flagship example (slice 8). App-land
# rendering: markdown → spans lives in the example, not the framework, so the
# framework's dependency budget is untouched (`docs/design/slice8-agent-chrome.md`).
pulldown-cmark = { version = "0.12", default-features = false }

[features]
default = ["themes"]
# TOML theme-file loading and debug-build hot reload. On by default; disabling it
# drops the `toml` dependency and the `theme` module (ADR 0007: file loading lives
# in the facade, core stays dep-free).
themes = ["dep:toml"]

[lints]
workspace = true
