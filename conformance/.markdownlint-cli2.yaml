# Inherits the repo-wide markdown rules, but relaxes the aligned-table rule for
# the conformance matrices. results-matrix.md is generated by the headless runner
# (examples/gen_matrix.rs), and the corpus tables in README.md carry cells that
# range from a single word to a full sentence, so the "aligned" pipe style fights
# the content for no reader benefit — the same reason docs/design/middle-piece-audit.md
# is exempted at the repo root. All other rules still apply here.
extends: ../.markdownlint-cli2.yaml
config:
  table-column-style: false
# results-matrix.md is generated; its intro prose can exceed the line-length cap
# and is not worth hand-reflowing between regenerations.
ignores:
  - results-matrix.md
