# CI scaffolding. NOTE: the workspace lives at work/default and depends on
# qwertty as a path dependency three levels up; until qwertty publishes (see
# RELEASE-CHECKLIST.md) CI clones it to the expected sibling location. If the
# clone is unavailable this workflow fails visibly — that is the checklist
# item, not a CI bug.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  WORKSPACE: work/default

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || git clone --depth 1 https://github.com/joshka/qwertty "$GITHUB_WORKSPACE/../qwertty-shim" && ln -sfn "$GITHUB_WORKSPACE/../qwertty-shim" ../../qwertty || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Test
        run: cargo test --workspace
        working-directory: ${{ env.WORKSPACE }}
      - name: Test conformance (standalone crate)
        # conformance/ has an empty [workspace] table (see conformance/Cargo.toml
        # + README.md → "Wiring into the workspace"), so it is NOT a member of the
        # root workspace and `cargo test --workspace` above does not reach it. It is
        # self-contained (only vt100, no qwertty path dep), so it runs on its own.
        run: cargo test
        working-directory: ${{ env.WORKSPACE }}/conformance

  msrv:
    # Policy: the *actual* MSRV is the true compile floor and "moves only when
    # needed" — it bumps only when the code adopts a newer language/std feature.
    # It is NOT the policy ceiling: the MSRV *policy* is stable-minus-one (N-1),
    # currently 1.95, which is only an upper bound we never exceed. Today the true
    # floor is 1.88, set by stabilized let-chains (`if let … && let …`, Rust 1.88)
    # used in rabbitui-agent/src/app.rs, rabbitui/examples/gallery.rs, et al.
    # This pin must equal `rust-version` under [workspace.package] in the root
    # Cargo.toml (currently "1.88"); bump both together only when the floor moves.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Check on MSRV
        run: cargo check --workspace
        working-directory: ${{ env.WORKSPACE }}

  semver-checks:
    # ADVISORY until the crates reach 0.1 on crates.io (docs/plans/arc5-field.md
    # item 7(b)). Low signal today: cargo-semver-checks compares against the last
    # PUBLISHED version, and these crates are unpublished (0.1.0 path deps only), so
    # it has no baseline to diff and mostly no-ops. Kept wired so the gate exists and
    # starts producing signal the moment a version lands on the registry.
    #
    # FLIP TO BLOCKING at 0.1: delete the `continue-on-error: true` line below.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: Check semver
        run: cargo semver-checks --workspace
        working-directory: ${{ env.WORKSPACE }}

  clippy:
    # Runs clippy on a matrix of stable AND beta. beta catches lints that are
    # about to land on stable, giving lead time to fix them. The beta leg is
    # continue-on-error so a newly-introduced upstream beta lint can't hard-block
    # a PR — it surfaces as a warning-level signal, not a gate. The stable leg
    # remains blocking (`-D warnings`).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    continue-on-error: ${{ matrix.toolchain == 'beta' }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: ${{ env.WORKSPACE }}

  fmt:
    # rustfmt runs on NIGHTLY (maintainer policy): formatting uses the good
    # unstable rustfmt options, which only nightly rustfmt applies. With no
    # unstable options in config today this matches stable, but it tracks the
    # local `cargo +nightly fmt` workflow and future-proofs a rustfmt.toml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Format
        run: cargo +nightly fmt --all --check
        working-directory: ${{ env.WORKSPACE }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Docs
        run: cargo doc --workspace --no-deps
        working-directory: ${{ env.WORKSPACE }}
        env:
          RUSTDOCFLAGS: -D warnings

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            work/default/**/*.md
            !work/default/target/**
