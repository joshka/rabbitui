# CI scaffolding. NOTE: the workspace lives at work/default and depends on
# qwertty as a path dependency three levels up; until qwertty publishes (see
# RELEASE-CHECKLIST.md) CI clones it to the expected sibling location. If the
# clone is unavailable this workflow fails visibly — that is the checklist
# item, not a CI bug.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  WORKSPACE: work/default

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || git clone --depth 1 https://github.com/joshka/qwertty "$GITHUB_WORKSPACE/../qwertty-shim" && ln -sfn "$GITHUB_WORKSPACE/../qwertty-shim" ../../qwertty || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Test
        run: cargo test --workspace
        working-directory: ${{ env.WORKSPACE }}
      - name: Test conformance (standalone crate)
        # conformance/ has an empty [workspace] table (see conformance/Cargo.toml
        # + README.md → "Wiring into the workspace"), so it is NOT a member of the
        # root workspace and `cargo test --workspace` above does not reach it. It is
        # self-contained (only vt100, no qwertty path dep), so it runs on its own.
        run: cargo test
        working-directory: ${{ env.WORKSPACE }}/conformance

  msrv:
    # MSRV = stable-minus-one per docs/plans/arc5-field.md item 7(a) and the brief.
    # Pinned here in ONE place. AUTHOR: confirm this concrete version each toolchain
    # bump — see the header note below. If you also want it enforced by cargo at the
    # manifest level, add `rust-version = "1.89"` under [workspace.package] in the
    # root Cargo.toml (it currently reads 1.85, the edition-2024 floor, NOT the MSRV
    # policy version); this workflow does not touch Cargo.toml to avoid colliding
    # with the code workstreams.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Check on MSRV
        run: cargo check --workspace --all-targets
        working-directory: ${{ env.WORKSPACE }}

  semver-checks:
    # ADVISORY until the crates reach 0.1 on crates.io (docs/plans/arc5-field.md
    # item 7(b)). Low signal today: cargo-semver-checks compares against the last
    # PUBLISHED version, and these crates are unpublished (0.1.0 path deps only), so
    # it has no baseline to diff and mostly no-ops. Kept wired so the gate exists and
    # starts producing signal the moment a version lands on the registry.
    #
    # FLIP TO BLOCKING at 0.1: delete the `continue-on-error: true` line below.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: Check semver
        run: cargo semver-checks --workspace
        working-directory: ${{ env.WORKSPACE }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone qwertty to the path-dependency location
        run: git clone --depth 1 https://github.com/joshka/qwertty ../../qwertty || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WORKSPACE }}
      - name: Format
        run: cargo fmt --check
        working-directory: ${{ env.WORKSPACE }}
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: ${{ env.WORKSPACE }}
      - name: Docs
        run: cargo doc --workspace --no-deps
        working-directory: ${{ env.WORKSPACE }}
        env:
          RUSTDOCFLAGS: -D warnings

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            work/default/**/*.md
            !work/default/target/**
